# Auto-labels pull requests by changed path (see .github/labeler.yml).
#
# Runs on pull_request_target (not pull_request) so a fork's PR always gets
# labeled using THIS repo's config on main, with a token that has write
# access — the safe pattern for that trigger is to never check out or
# execute the PR's own code, which this workflow doesn't: actions/labeler
# only reads the changed-files list from the API, no checkout step needed.
name: label

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
