# Publishes a single script's bundle as a GitHub Release.
#
# Trigger a release by tagging `<id>@<version>` (e.g. `chomp@1.1.0`), where
# `<id>` is a scripts/<id>/ folder name and `<version>` matches that folder's
# manifest.json "version" field exactly. `template/` is a scaffold, not a
# published script, and is rejected.
name: release

on:
  push:
    tags:
      - "*@*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Parse and validate the <id>@<version> tag
        id: tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          id="${tag%@*}"
          version="${tag##*@}"

          if [ "$id" = "template" ]; then
            echo "template/ is a scaffold to copy, not a releasable script" >&2
            exit 1
          fi

          manifest="scripts/$id/manifest.json"
          if [ ! -f "$manifest" ]; then
            echo "no $manifest for tag '$tag' — is '$id' a real scripts/ folder?" >&2
            exit 1
          fi

          manifest_version="$(jq -r '.version' "$manifest")"
          if [ "$manifest_version" != "$version" ]; then
            echo "tag version '$version' does not match $manifest's version '$manifest_version'" >&2
            exit 1
          fi

          echo "id=$id" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build the tagged script
        run: bun run build ${{ steps.tag.outputs.id }}

      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.tag.outputs.tag }}" \
            "scripts/${{ steps.tag.outputs.id }}/dist/${{ steps.tag.outputs.id }}.js" \
            --title "${{ steps.tag.outputs.id }}@${{ steps.tag.outputs.version }}" \
            --generate-notes
