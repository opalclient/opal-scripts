# House CI gate. Runs on push to main and on every pull request.
#
# This is a bun workspace (packages/*, scripts/*, template) — see CLAUDE.md
# for the layout. One job, sequential steps, in the order a contributor
# would run them locally:
#
#   1. validate   — manifest schema + publish-safety grep (tools/*.mjs)
#   2. lint       — Biome
#   3. typecheck  — template/'s tsconfig, plus any scripts/*/tsconfig.json
#                   that shows up later (JS-only script folders have none
#                   today, so this loop is a no-op until one adds TypeScript)
#   4. build      — bundles every scripts/<id>/ folder via esbuild
#                   (1 MB/bundle cap enforced in tools/build.mjs)
#   5. test       — every scripts/<id>/tests/* file, one child process each
#   6. check:template — build + typecheck + test the template scaffold
#                   end to end, the same single command a template/ change
#                   should stay green under (see template/README.md)
#   7. gate summary — on PRs only: upserts one sticky comment (marker
#                   `<!-- gate-summary -->`) with a pass/fail/skipped table
#                   built from the outcome of steps 1-6 above. Runs with
#                   `if: always()` so it still posts after an earlier gate
#                   fails. Needs `pull-requests: write`, which forked PRs
#                   never actually get (GITHUB_TOKEN is read-only there
#                   regardless of this permissions block) — the same-repo
#                   condition plus continue-on-error just keeps that
#                   expected failure from being noisy. The gates themselves
#                   (steps 1-6) are unaffected either way; this step only
#                   ever adds a comment, never a check result.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate manifests + publish-safety
        id: validate
        run: bun run validate

      - name: Lint
        id: lint
        run: bun run lint

      - name: Typecheck every tsconfig in the repo
        id: typecheck
        run: |
          set -euo pipefail
          bunx tsc --noEmit -p template
          while IFS= read -r -d '' tsconfig; do
            dir="$(dirname "$tsconfig")"
            echo "typecheck $dir"
            bunx tsc --noEmit -p "$dir"
          done < <(find scripts -mindepth 2 -maxdepth 2 -name tsconfig.json -print0)

      - name: Build every script bundle
        id: build
        run: bun run build

      - name: Run every script's test suite
        id: test
        run: bun run test

      - name: Verify the template scaffold end to end
        id: check-template
        run: bun run check:template

      - name: Post sticky gate-summary comment
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- gate-summary -->";
            const gates = [
              { label: "validate (manifest + publish-safety)", outcome: "${{ steps.validate.outcome }}" },
              { label: "lint (Biome)", outcome: "${{ steps.lint.outcome }}" },
              { label: "typecheck", outcome: "${{ steps.typecheck.outcome }}" },
              { label: "build", outcome: "${{ steps.build.outcome }}" },
              { label: "test", outcome: "${{ steps.test.outcome }}" },
              { label: "check:template", outcome: "${{ steps.check-template.outcome }}" },
            ];

            const icon = (outcome) => {
              if (outcome === "success") return "pass";
              if (outcome === "skipped") return "skipped";
              if (outcome === "cancelled") return "cancelled";
              return "FAIL";
            };

            const rows = gates.map((g) => `| ${g.label} | ${icon(g.outcome)} |`).join("\n");
            const body = [
              marker,
              "### CI gate summary",
              "",
              "| Gate | Result |",
              "| --- | --- |",
              rows,
              "",
              "Summary only — merge still needs every required check green plus a CODEOWNERS review.",
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
